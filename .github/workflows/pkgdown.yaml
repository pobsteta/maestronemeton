# Workflow standard r-lib pour deployer pkgdown sur GitHub Pages.
# Cf. https://github.com/r-lib/actions/tree/v2/examples
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

# Annule un run en cours sur la meme branche/ref si un nouveau push arrive,
# pour eviter de saturer la file et accumuler des cancels timeoute.
concurrency:
  group: pkgdown-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          # local::. installe le package lui-meme + ses Imports.
          # pkgdown + knitr + rmarkdown couvrent le build du site.
          # On evite "needs: website" qui forcerait l'install de tous les
          # Suggests (lasR via r-universe, hfhub, optparse...) pas necessaires
          # pour le rendu des vignettes (chunks en eval=FALSE).
          extra-packages: |
            any::pkgdown
            any::knitr
            any::rmarkdown
            local::.
          dependencies: '"hard"'

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
