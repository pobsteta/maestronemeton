# conf/datasets/pureforest.yaml
# ------------------------------
# Configuration Hydra du dataset PureForest pour fine-tuning MAESTRO.
# A deposer dans un fork de `IGNF/MAESTRO` sous `conf/datasets/pureforest.yaml`.
#
# Cible : aerial seul en phase 1 ; dem ajoute en phase 2 ;
# s2 / s1_asc / s1_des ajoutes en phase 3.

# @package _global_

datasets:
  name_dataset: pureforest
  pureforest:
    class_path: maestro.datasets.pureforest.PureForestDataset
    rel_dir: pureforest_maestro
    n_classes: 13
    task_type: single_label_classification

    # Modalites filtrables via `datasets.pureforest.filter_inputs=[aerial,dem]`
    filter_inputs: [aerial]

    splits:
      train: train
      val:   validation
      test:  test

    # Specifications par modalite (cf. fiche HF IGNF/MAESTRO_FLAIR-HUB_base)
    modalities:
      aerial:
        in_channels: 4         # R, G, B, NIR
        image_size: 256        # multiple de patch_size.mae=16
        resolution: 0.2        # m / pixel (resample 250 -> 256, GSD ~0.195 m)
        patch_size:
          mae: 16
        # mean/std calcules par prepare_pureforest_aerial.py (normalization.json)

      dem:
        in_channels: 2         # DSM, DTM
        image_size: 256
        resolution: 0.2
        patch_size:
          mae: 32

      s2:
        in_channels: 10        # B02, B03, B04, B05, B06, B07, B08, B8A, B11, B12
        image_size: 6          # 60 m / 10 m
        resolution: 10
        patch_size:
          mae: 2

      s1_asc:
        in_channels: 2         # VV, VH (dB)
        image_size: 6
        resolution: 10
        patch_size:
          mae: 2

      s1_des:
        in_channels: 2
        image_size: 6
        resolution: 10
        patch_size:
          mae: 2

# Loss et metriques pour la tache mono-label
loss:
  name: cross_entropy
  class_weights: inverse_frequency  # calcule sur le split train

metrics:
  primary: balanced_accuracy_val
  log:
    - overall_accuracy
    - balanced_accuracy
    - f1_macro
    - confusion_matrix
