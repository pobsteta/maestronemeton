url: https://pobsteta.github.io/maestronemeton/

template:
  bootstrap: 5
  bslib:
    primary: "#2E7D32"
    base_font: {google: "Inter"}
    heading_font: {google: "Inter"}
    code_font: {google: "JetBrains Mono"}

home:
  title: maestronemeton — Reconnaissance des essences forestieres et occupation du sol
  description: >
    Pipeline R + Python pour la classification d'essences forestieres
    (PureForest 13 classes) et de l'occupation du sol (CoSIA 19 classes)
    avec les modeles MAESTRO et FLAIR de l'IGN.

navbar:
  structure:
    left:  [intro, articles, reference, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
      - text: Getting started
        href: articles/getting-started.html
      - text: Pipeline Python (MAESTRO / FLAIR)
        href: articles/python-pipeline.html
    reference:
      text: Reference
      href: reference/index.html

